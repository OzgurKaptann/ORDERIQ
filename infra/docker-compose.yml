services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orderiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
    volumes:
      - ../apps/api:/app
      - ../apps/api/media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      # Internal docker network URL for SSR fetches (server → api container)
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
